<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <defs>
    <!-- Premium Golden / Champagne Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF8F5"/>
      <stop offset="100%" stop-color="#EFECE6"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A7A35"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E5D3A2"/>
    </linearGradient>
    <linearGradient id="bottleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2D2D2D"/>
      <stop offset="10%" stop-color="#4A4A4A"/>
      <stop offset="50%" stop-color="#1F1F1F"/>
      <stop offset="90%" stop-color="#3A3A3A"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Subtle background border -->
  <rect x="15" y="15" width="370" height="470" rx="8" fill="none" stroke="#C9A84C" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Silhouette Graphic -->
  <g filter="url(#shadow)" transform="translate(0, -10)">

    <!-- Dropper bulb -->
    <path d="M192,100 C192,90 208,90 208,100 L208,110 L192,110 Z" fill="#222"/>
    <!-- Collar -->
    <rect x="182" y="110" width="36" height="12" rx="1" fill="url(#goldGrad)"/>
    <!-- Neck -->
    <rect x="188" y="122" width="24" height="8" fill="#FFF" fill-opacity="0.3"/>
    <!-- Dropper bottle body -->
    <path d="M188,130 C168,135 160,150 160,165 L160,290 C160,300 170,310 180,310 L220,310 C230,310 240,300 240,290 L240,165 C240,150 232,135 212,130 Z" fill="url(#bottleGrad)"/>
    <!-- Label -->
    <rect x="170" y="175" width="60" height="100" rx="2" fill="#FFFFFF" fill-opacity="0.95"/>
    
  </g>
  
  <!-- Brand Name -->
  <text x="200" y="380" font-family="'Cormorant Garamond', 'Times New Roman', serif" font-size="14" font-weight="600" fill="#9A7A35" letter-spacing="4" text-anchor="middle">ITALIA COSMETICS</text>
  
  <!-- Product Line / Category -->
  <text x="200" y="405" font-family="'Montserrat', sans-serif" font-size="9" font-weight="600" fill="#8E8577" letter-spacing="2" text-anchor="middle">TREATMENTS &amp; SERUMS</text>
  
  <!-- Product Name -->
  <text x="200" y="435" font-family="'Cormorant Garamond', 'Times New Roman', serif" font-size="15" font-style="italic" font-weight="500" fill="#1A1A1A" text-anchor="middle">UNA DESIGNING OIL</text>
  <text x="200" y="455" font-family="'Cormorant Garamond', 'Times New Roman', serif" font-size="15" font-style="italic" font-weight="500" fill="#1A1A1A" text-anchor="middle">NON OIL 250ML</text>
  
  <!-- SKU Code -->
  <rect x="150" y="25" width="100" height="18" rx="9" fill="#1A1A1A" fill-opacity="0.05"/>
  <text x="200" y="37" font-family="'Montserrat', sans-serif" font-size="8" font-weight="500" fill="#7A7060" letter-spacing="1" text-anchor="middle">UNA0421</text>
</svg>
