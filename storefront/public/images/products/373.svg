<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <defs>
    <!-- Premium Golden / Champagne Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF8F5"/>
      <stop offset="100%" stop-color="#EFECE6"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A7A35"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E5D3A2"/>
    </linearGradient>
    <linearGradient id="bottleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2D2D2D"/>
      <stop offset="10%" stop-color="#4A4A4A"/>
      <stop offset="50%" stop-color="#1F1F1F"/>
      <stop offset="90%" stop-color="#3A3A3A"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Subtle background border -->
  <rect x="15" y="15" width="370" height="470" rx="8" fill="none" stroke="#C9A84C" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Silhouette Graphic -->
  <g filter="url(#shadow)" transform="translate(0, -10)">

    <!-- Lid -->
    <rect x="140" y="170" width="120" height="24" rx="4" fill="url(#goldGrad)"/>
    <!-- Neck -->
    <rect x="146" y="194" width="108" height="6" fill="#151515"/>
    <!-- Jar body -->
    <path d="M140,200 C140,200 135,280 145,300 C155,310 165,310 200,310 C235,310 245,310 255,300 C265,280 260,200 260,200 Z" fill="url(#bottleGrad)"/>
    <!-- Label on jar -->
    <rect x="150" y="215" width="100" height="60" rx="3" fill="#FFFFFF" fill-opacity="0.95"/>
    <rect x="154" y="219" width="92" height="52" fill="none" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.3"/>
    
  </g>
  
  <!-- Brand Name -->
  <text x="200" y="380" font-family="'Cormorant Garamond', 'Times New Roman', serif" font-size="14" font-weight="600" fill="#9A7A35" letter-spacing="4" text-anchor="middle">ITALIA COSMETICS</text>
  
  <!-- Product Line / Category -->
  <text x="200" y="405" font-family="'Montserrat', sans-serif" font-size="9" font-weight="600" fill="#8E8577" letter-spacing="2" text-anchor="middle">CONDITIONERS &amp; MASKS</text>
  
  <!-- Product Name -->
  <text x="200" y="435" font-family="'Cormorant Garamond', 'Times New Roman', serif" font-size="15" font-style="italic" font-weight="500" fill="#1A1A1A" text-anchor="middle">4 COPPER COLORING</text>
  <text x="200" y="455" font-family="'Cormorant Garamond', 'Times New Roman', serif" font-size="15" font-style="italic" font-weight="500" fill="#1A1A1A" text-anchor="middle">MASK 200ML</text>
  
  <!-- SKU Code -->
  <rect x="150" y="25" width="100" height="18" rx="9" fill="#1A1A1A" fill-opacity="0.05"/>
  <text x="200" y="37" font-family="'Montserrat', sans-serif" font-size="8" font-weight="500" fill="#7A7060" letter-spacing="1" text-anchor="middle">373</text>
</svg>
